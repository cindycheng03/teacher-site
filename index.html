<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NYCU 健康促進平台</title>

<style>
:root {
  --primary: #2f4f6f;
  --accent: #f4a261;
  --light: #f7f7f7;
}

/* ===== 基本 ===== */
body {
  margin: 0;
  font-family: "Noto Sans TC", sans-serif;
  background: #fff;
  color: #333;
}

/* ===== Navbar ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
}

.logo {
  font-weight: bold;
}

.nav-links {
  display: flex;
  gap: 24px;
}

/* ===== Hero ===== */
.hero-wrapper {
  background: #f2f3f5;
  border-radius: 20px;
  margin: 20px;
  padding: 40px;
}

.hero {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 20px;
  align-items: center;
}

/* 標題 */
.hero h1 {
  font-size: 48px;
  line-height: 1.3;
  font-weight: 900;
  color: var(--primary);
  margin: 0;
}

/* 黃色字 */
.highlight {
  color: #f4a261;
}

/* 內文 */
.hero-desc {
  margin-top: 20px;
  color: #666;
  line-height: 1.8;
  max-width: 600px;
}

/* 英文標籤（移到底） */
.eyebrow {
  margin-top: 20px;
  color: #999;
  font-size: 14px;
}

/* 按鈕 */
.hero-actions {
  margin-top: 40px;
  display: flex;
  gap: 12px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  padding: 12px 20px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
}

.btn-secondary {
  background: transparent;
  border: none;
  color: #333;
  cursor: pointer;
}

/* ===== 右側卡片 ===== */
.profile-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

/* 頭像 */
.profile-card img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
}

/* 文字 */
.profile-text {
  text-align: left;
}

.profile-text h3 {
  margin: 0;
  color: var(--primary);
}

.profile-text p {
  margin-top: 8px;
  font-size: 14px;
  line-height: 1.7;
  color: #666;
}

/* 底線 */
.profile-line {
  width: 40px;
  height: 4px;
  background: var(--accent);
  margin-top: 12px;
  border-radius: 2px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">
    NYCU 健康促進平台<br>
    <small>陽明交通大學 黃久美 教授</small>
  </div>
  <div class="nav-links">
    <span>首頁</span>
    <span>計畫介紹</span>
    <span>成果展示</span>
    <span>教學紀錄</span>
    <span>聯絡我們</span>
  </div>
</div>

<!-- Hero -->
<div class="hero-wrapper">
  <div class="hero">

    <!-- 左 -->
    <div>
      <h1>
        深耕社區 <span class="highlight">健康促進</span><br>
        走進每一個需要的角落
      </h1>

      <p class="hero-desc">
        本平台展示健康促進與社區長照相關的教學、研究與實務成果，
        透過教材、課程與影音內容的整理與分享，傳遞專業知識、照護理念與溫暖關懷。
      </p>

      <div class="eyebrow">
        For Health • For Community • For Education
      </div>

      <div class="hero-actions">
        <button class="btn-primary">查看成果</button>
        <button class="btn-secondary">播放介紹影片</button>
      </div>
    </div>

    <!-- 右 -->
    <div class="profile-card">
      <img src="https://con.nycu.edu.tw/upload/news_committees_list_pic/twL_news_committees_22E13_SRnbUzQywD.jpg">

      <div class="profile-text">
        <h3>黃久美 教授</h3>
        <p>
          以健康促進與社區長照為核心，持續關注不同生命階段的照護需求，
          期待透過教學、研究與實務的連結，為社區帶來更多理解、支持與陪伴。
        </p>
        <div class="profile-line"></div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
