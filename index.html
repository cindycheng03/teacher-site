<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>教師成果網站</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Noto Sans TC", sans-serif;
      background: #f2f2ef;
      color: #333;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }

    .logo {
      font-weight: 900;
      font-size: 20px;
      color: #2c4a66;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 20px;
      border: 1px solid #7aa9d6;
      background: white;
      cursor: pointer;
    }

    /* HERO */
    .hero {
      background: white;
      border-radius: 25px;
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }

    .hero h1 {
      font-size: 42px;
      color: #2c4a66;
      margin: 0;
    }

    .hero span {
      color: #f4a43c;
    }

    .hero p {
      color: #666;
      margin-top: 15px;
    }

    .hero img {
      width: 100%;
      border-radius: 20px;
      margin-top: 20px;
    }

    /* STATS */
    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .stat {
      flex: 1;
      min-width: 120px;
      margin: 10px;
    }

    .stat h2 {
      color: #2c4a66;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.05);
    }

    .card h2 {
      margin-top: 0;
      color: #2c4a66;
    }

    .date {
      font-size: 12px;
      color: #999;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- NAV -->
  <div class="nav">
    <div class="logo">EduHope 教師成果</div>
    <button class="btn">了解更多</button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>用教育帶來<span>希望</span>，讓成果被看見</h1>
    <p>透過教學紀錄、成果展示與影音內容，打造一個溫暖且專業的教育平台。</p>

    <img src="https://images.unsplash.com/photo-1503676382389-4809596d5290" />

    <div class="stats">
      <div class="stat">
        <h2>250K</h2>
        <p>參與人次</p>
      </div>
      <div class="stat">
        <h2>500+</h2>
        <p>教師參與</p>
      </div>
      <div class="stat">
        <h2>100%</h2>
        <p>完成率</p>
      </div>
    </div>
  </div>

  <!-- 動態內容（Notion） -->
  <div class="cards" id="content">載入中...</div>

</div>

<script>
fetch("./data.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("content");
    container.innerHTML = "";

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h2>${item.title}</h2>
        <div class="date">${item.date}</div>
        <p>${item.summary}</p>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
