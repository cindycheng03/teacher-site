<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>教師成果網站</title>
</head>
<body>
  <h1>教師成果網站</h1>
  <div id="content">載入中...</div>

  <script>
    fetch("./data.json")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("content");
        container.innerHTML = "";

        data.forEach(item => {
          const div = document.createElement("div");

          div.innerHTML = `
            <h2>${item.title}</h2>
            <p>${item.date}</p>
            <p>${item.summary}</p>
            <hr>
          `;

          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
